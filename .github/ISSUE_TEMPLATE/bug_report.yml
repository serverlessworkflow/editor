name: Bug Report
description: Create a report to help us improve the editor
title: "[BUG]: <title>"
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the editor...
        2. Upload workflow file...
        3. Click on...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Editor Version
      description: What version of the editor/extension are you using?
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web / Browser
        - VS Code Extension
        - Chrome Extension
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or .sw.json / .sw.yaml snippets here.