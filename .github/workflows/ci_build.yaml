name: "CI :: Build"

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event.pull_request && format('ci-build-full-pr-{0}', github.event.pull_request.number) || format('ci-build-full-push-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  build-and-test:
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Install dependencies
        run: pnpm install ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' && '--no-frozen-lockfile' || '' }}

      - name: Install Playwright browsers
        run: pnpm playwright:install:ci

      - name: Check dependency and package version consistency
        run: pnpm dependencies:check

      - name: Build and test
        run: pnpm build:prod

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.os }}
          path: |
            packages/**/playwright-report/
            packages/**/test-results/
          retention-days: 30
