document:
  dsl: "1.0.3"
  namespace: default
  name: multi-agent-collaboration-for-ai-content
  version: "0.1.0"
input:
  schema:
    document:
      type: object
      properties:
        prompt:
          type: string
      required: [prompt]
do:
  - initialize:
      set:
        prompt: ${ $workflow.input.prompt }
      export:
        as: .prompt

  - generateText:
      call: http
      with:
        method: post
        endpoint: https://ai-content-generator.com/api/v1/generate-text
        body:
          prompt: ${ .prompt }
      export:
        as: "$context + { text: .text }"

  - generateImage:
      call: http
      with:
        method: post
        endpoint: https://ai-content-generator.com/api/v1/generate-image
        body:
          text: ${ .text }
      export:
        as: "$context + { image: .image }"

  - evaluateQuality:
      call: http
      with:
        method: post
        endpoint: https://ai-content-generator.com/api/v1/evaluate
        body:
          text: ${ .text }
          image: ${ .image }
      export:
        as: "$context + { evaluation: .evaluation }"

  - refineContent:
      switch:
        - needsRefinement:
            when: .evaluation.needsRefinement == true
            then: refine
        - noRefinementNeeded:
            when: .evaluation.needsRefinement == false
            then: deliverContent

  - refine:
      do:
        - refineText:
            call: http
            with:
              method: post
              endpoint: https://ai-content-generator.com/api/v1/refine-text
              body:
                text: ${ .text }
                feedback: ${ .evaluation.text_feedback }
        - refineImage:
            call: http
            with:
              method: post
              endpoint: https://ai-content-generator.com/api/v1/refine-image
              body:
                image: ${ .image }
                feedback: ${ .evaluation.image_feedback }
        - reevaluate:
            call: http
            with:
              method: post
              endpoint: https://ai-content-generator.com/api/v1/evaluate
              body:
                text: ${ .refined_text }
                image: ${ .refined_image }
            export:
              as: .evaluation
      then: evaluateQuality

  - deliverContent:
      do:
        - notify:
            emit:
              event:
                with:
                  source: https://ai-content-generator.com
                  type: com.ai-content-generator.content.ready.v1
                  data:
                    text: ${ .text }
                    image: ${ .image }
      then: end
